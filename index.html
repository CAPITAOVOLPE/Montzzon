<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MONTZZON | Seleção Premium 2026</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root{
--primary-gold:#fbbf24;
--whatsapp-green:#25d366;
}
body{
font-family:'Inter',sans-serif;
background-color:#03140e;
background-image:url('fundo.jpeg');
background-size:cover;
background-position:center;
background-attachment:fixed;
color:white;
min-height:100vh;
-webkit-tap-highlight-color:transparent;
}

.glass-card{
background:rgba(15,23,42,.9);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.1);
border-radius:24px;
}

.logo-container img{
max-width:180px;
filter:brightness(0) invert(1);
}

.step-content{
display:none;
animation:fadeIn .4s ease-out forwards;
}

.step-content.active{
display:block;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(15px);}
to{opacity:1;transform:translateY(0);}
}

.input-field{
background:rgba(255,255,255,.07);
border:1px solid rgba(255,255,255,.2);
color:white;
font-size:16px!important;
transition:.3s;
appearance:none;
}

.input-field:focus{
border-color:var(--primary-gold);
outline:none;
background:rgba(255,255,255,.12);
}

.btn-next{
background:var(--primary-gold);
color:black;
font-weight:900;
text-transform:uppercase;
height:64px;
border-radius:18px;
box-shadow:0 10px 20px -10px rgba(251,191,36,.5);
}

.btn-buy{
background:linear-gradient(135deg,#25d366 0%,#128c7e 100%);
font-weight:900;
height:70px;
border-radius:20px;
position:relative;
overflow:hidden;
animation:pulseBtn 1.8s infinite;
}

.btn-buy::after{
content:'';
position:absolute;
top:0;
left:-120%;
width:60%;
height:100%;
background:rgba(255,255,255,.18);
transform:skewX(-20deg);
animation:shine 2.5s infinite;
}

@keyframes pulseBtn{
0%,100%{transform:scale(1);}
50%{transform:scale(1.03);}
}

@keyframes shine{
to{left:140%;}
}

.description-tag{
font-size:11px;
letter-spacing:.15em;
color:var(--primary-gold);
font-weight:800;
text-transform:uppercase;
display:block;
margin-bottom:4px;
}

.narrative-text{
font-size:13px;
color:rgba(255,255,255,.7);
font-style:italic;
line-height:1.4;
}

input::-webkit-outer-spin-button,
input::-webkit-inner-spin-button{
-webkit-appearance:none;
margin:0;
}

.safe-area-bottom{
padding-bottom:env(safe-area-inset-bottom);
}
</style>
</head>

<body class="flex flex-col items-center safe-area-bottom">

<header class="w-full py-6 flex justify-center bg-black/40 backdrop-blur-md sticky top-0 z-50 border-b border-white/5">
<div class="logo-container">
<img src="20260427_071542_0000.png" alt="MONTZZON">
</div>
</header>

<main class="w-full max-w-md px-5 pt-8 pb-12">

<div class="text-center mb-8">
<h1 class="text-4xl font-black italic mb-1 tracking-tighter uppercase leading-none">Brasil 2026</h1>
<p class="text-yellow-400 font-bold uppercase tracking-[0.2em] text-[10px]">Edição Especial Limitada</p>
</div>

<section id="step1" class="step-content active">

<div class="glass-card p-8 text-center shadow-2xl">

<h2 class="text-xl font-bold mb-6 italic uppercase tracking-tight">
Escolha os modelos
</h2>

<div class="grid grid-cols-2 gap-4 mb-6">

<button onclick="addGenero('UNISSEX')" class="btn-next w-full">
Unissex
</button>

<button onclick="addGenero('Feminino')" class="btn-next w-full">
Feminino
</button>

</div>

<div id="listaGenero" class="space-y-3 mb-6"></div>

<div class="text-4xl font-black text-yellow-400 mb-6">
<span id="qtyDisplay">0</span>
</div>

<button onclick="goToStep2()" class="btn-next w-full">
ESCOLHER DETALHES
</button>

</div>

</section>

<section id="step2" class="step-content">
<div id="itemsContainer" class="space-y-5 mb-8"></div>

<div class="flex flex-col gap-3">
<button onclick="goToStep3()" class="btn-next w-full">PRÓXIMO PASSO</button>
<button onclick="backToStep1()" class="w-full py-4 text-white/40 font-bold uppercase text-xs">Voltar</button>
</div>
</section>

<section id="step3" class="step-content">

<div class="glass-card p-6 mb-6">

<h2 class="text-lg font-bold mb-5 text-yellow-400 italic uppercase">
Dados de Entrega
</h2>

<div class="space-y-4">

<div class="grid grid-cols-2 gap-4">
<input type="tel" id="cep" placeholder="CEP"
class="input-field w-full p-4 rounded-xl font-bold"
maxlength="9"
oninput="mascaraCEP(this);buscarCEPauto()">

<input type="text" id="bairro" placeholder="Bairro"
class="input-field w-full p-4 rounded-xl font-bold uppercase">
</div>

<input type="text" id="rua" placeholder="Rua"
class="input-field w-full p-4 rounded-xl font-bold uppercase">

<div class="grid grid-cols-3 gap-4">
<input type="text" id="numero" placeholder="Nº"
class="input-field w-full p-4 rounded-xl font-bold uppercase">

<input type="text" id="complemento" placeholder="Apto/Bl"
class="input-field col-span-2 w-full p-4 rounded-xl font-bold uppercase">
</div>

</div>
</div>

<div class="flex flex-col gap-3">
<button onclick="goToStep4()" class="btn-next w-full">DADOS PESSOAIS</button>
<button onclick="backToStep2()" class="w-full py-4 text-white/40 font-bold uppercase text-xs">Voltar</button>
</div>

</section>

<section id="step4" class="step-content">

<div class="glass-card p-6 mb-8">
<h2 class="text-lg font-bold mb-5 text-yellow-400 italic uppercase">
Identificação
</h2>

<div class="space-y-4">
<input type="text" id="cliente_nome" placeholder="Nome Completo"
class="input-field w-full p-4 rounded-xl font-bold uppercase">

<input type="tel" id="cliente_cpf" placeholder="CPF"
class="input-field w-full p-4 rounded-xl font-bold">

<input type="tel" id="cliente_tel" placeholder="WhatsApp"
class="input-field w-full p-4 rounded-xl font-bold">
</div>
</div>

<button onclick="finalizarPedido()" class="btn-buy w-full">
FINALIZAR NO WHATSAPP
</button>

<button onclick="backToStep3()" class="w-full py-4 text-white/40 font-bold uppercase text-xs">
Voltar
</button>

</section>

</main>

<audio id="bgMusic" loop>
<source src="music.mp3" type="audio/mpeg">
<script src="scripts.js" defer></script>
</audio>
